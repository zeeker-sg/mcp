# Production deployment for this Contabo host.
# Caddy is NOT in this compose file — it's the host systemd Caddy at /etc/caddy/Caddyfile.
# Datasette is NOT in this compose file — the operator-managed zeeker-datasette
# stack already runs at https://data.zeeker.sg; we join its docker network as external.

services:
  mcp:
    build: .
    container_name: zeeker-mcp
    environment:
      UPSTREAM_URL: http://zeeker-datasette:8001
      USER_AGENT: mcp-zeeker/0.1
    ports:
      - "127.0.0.1:8002:8000"
    networks: [zeeker-datasette_default]
    restart: unless-stopped

networks:
  zeeker-datasette_default:
    external: true
