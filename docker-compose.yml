# Production deployment for this Contabo host.
# Caddy is NOT in this compose file — it's the host systemd Caddy at /etc/caddy/Caddyfile.
# Datasette is NOT in this compose file — the operator-managed zeeker-datasette
# stack already runs at https://data.zeeker.sg; we join its docker network as external.

services:
  mcp:
    build: .
    container_name: zeeker-mcp
    init: true
    environment:
      UPSTREAM_URL: http://zeeker-datasette:8001
      USER_AGENT: mcp-zeeker/0.1
      # Owner full-access token shared with the zeeker-datasette stack
      # (same env var name there). Grants this server full, unstripped
      # upstream content past the strip-columns catalogue lockdown.
      # Set in the host .env; empty → anonymous-tier (stripped) access.
      ZEEKER_FULL_ACCESS_TOKEN: ${ZEEKER_FULL_ACCESS_TOKEN:-}
    ports:
      - "127.0.0.1:8002:8000"
    networks: [zeeker-datasette_default]
    restart: unless-stopped
    # Bounds log disk usage and backs the privacy-policy 30-day retention
    # claim. At observed ~250 KB/day traffic, 30 × 10MB segments give multi-
    # year size headroom — the time-based cap is enforced by the daily prune
    # at /etc/cron.daily/zeeker-mcp-log-prune (installed separately as root).
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "30"

networks:
  zeeker-datasette_default:
    external: true
